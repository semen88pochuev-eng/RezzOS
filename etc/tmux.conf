# RezzOS Seamless Terminal Scrollback Configuration

# Completely disable status bar (no bottom panel or messages)
set -g status off

# Disable special highlighted mode styling
set -g mode-style bg=default,fg=default

# Scrollback history limit
set -g history-limit 10000

# Enable mouse wheel scrolling
set -g mouse on

# Bind PageUp / Shift+PageUp to scroll up
bind-key -n PageUp copy-mode -u
bind-key -n S-PageUp copy-mode -u

# In scroll mode: PageUp / PageDown / Up / Down move through history
bind-key -T copy-mode-vi PageUp send-keys -X page-up
bind-key -T copy-mode-vi PageDown send-keys -X page-down
bind-key -T copy-mode-vi Up send-keys -X cursor-up
bind-key -T copy-mode-vi Down send-keys -X cursor-down

# Instant exit from scroll mode on Enter, Escape, Space, Backspace
bind-key -T copy-mode-vi Enter send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi Space send-keys -X cancel
bind-key -T copy-mode-vi BSpace send-keys -X cancel

# Instant exit from scroll mode on typing any letter (so user never gets stuck)
bind-key -T copy-mode-vi a send-keys -X cancel
bind-key -T copy-mode-vi b send-keys -X cancel
bind-key -T copy-mode-vi c send-keys -X cancel
bind-key -T copy-mode-vi d send-keys -X cancel
bind-key -T copy-mode-vi e send-keys -X cancel
bind-key -T copy-mode-vi f send-keys -X cancel
bind-key -T copy-mode-vi g send-keys -X cancel
bind-key -T copy-mode-vi h send-keys -X cancel
bind-key -T copy-mode-vi i send-keys -X cancel
bind-key -T copy-mode-vi j send-keys -X cancel
bind-key -T copy-mode-vi k send-keys -X cancel
bind-key -T copy-mode-vi l send-keys -X cancel
bind-key -T copy-mode-vi m send-keys -X cancel
bind-key -T copy-mode-vi n send-keys -X cancel
bind-key -T copy-mode-vi o send-keys -X cancel
bind-key -T copy-mode-vi p send-keys -X cancel
bind-key -T copy-mode-vi q send-keys -X cancel
bind-key -T copy-mode-vi r send-keys -X cancel
bind-key -T copy-mode-vi s send-keys -X cancel
bind-key -T copy-mode-vi t send-keys -X cancel
bind-key -T copy-mode-vi u send-keys -X cancel
bind-key -T copy-mode-vi v send-keys -X cancel
bind-key -T copy-mode-vi w send-keys -X cancel
bind-key -T copy-mode-vi x send-keys -X cancel
bind-key -T copy-mode-vi y send-keys -X cancel
bind-key -T copy-mode-vi z send-keys -X cancel
