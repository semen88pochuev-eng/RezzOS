# RezzOS Pure Invisible Terminal Scrollback Configuration

set -g status off
set -g mode-style "bg=black,fg=black"
set -g history-limit 10000
set -g mouse on

# Only enter scroll mode if there IS scrollback history (history_size > 0).
# On a clean screen (history_size == 0), PageUp will NOT move the cursor at all!
bind-key -n PageUp if-shell -F "#{>:#{history_size},0}" "copy-mode -u" ""
bind-key -n S-PageUp if-shell -F "#{>:#{history_size},0}" "copy-mode -u" ""

# In scroll mode: PageUp / PageDown scroll page-by-page
bind-key -T copy-mode PageUp send-keys -X page-up
bind-key -T copy-mode S-PageUp send-keys -X page-up
bind-key -T copy-mode PageDown send-keys -X page-down
bind-key -T copy-mode S-PageDown send-keys -X page-down

bind-key -T copy-mode-vi PageUp send-keys -X page-up
bind-key -T copy-mode-vi S-PageUp send-keys -X page-up
bind-key -T copy-mode-vi PageDown send-keys -X page-down
bind-key -T copy-mode-vi S-PageDown send-keys -X page-down

# Up / Down arrows scroll line-by-line
bind-key -T copy-mode Up send-keys -X cursor-up
bind-key -T copy-mode Down send-keys -X cursor-down
bind-key -T copy-mode-vi Up send-keys -X cursor-up
bind-key -T copy-mode-vi Down send-keys -X cursor-down

# Mouse wheel scrolling
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# Disable Jump Forward / Jump Backward / Search prompts in copy mode
bind-key -T copy-mode f send-keys -X cancel
bind-key -T copy-mode F send-keys -X cancel
bind-key -T copy-mode t send-keys -X cancel
bind-key -T copy-mode T send-keys -X cancel
bind-key -T copy-mode-vi f send-keys -X cancel
bind-key -T copy-mode-vi F send-keys -X cancel
bind-key -T copy-mode-vi t send-keys -X cancel
bind-key -T copy-mode-vi T send-keys -X cancel

# Exit scroll mode on Escape, Enter, Space, Backspace, or q
bind-key -T copy-mode Enter send-keys -X cancel
bind-key -T copy-mode Escape send-keys -X cancel
bind-key -T copy-mode Space send-keys -X cancel
bind-key -T copy-mode q send-keys -X cancel

bind-key -T copy-mode-vi Enter send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi Space send-keys -X cancel
bind-key -T copy-mode-vi q send-keys -X cancel
